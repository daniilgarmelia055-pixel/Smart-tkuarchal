<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Smart Tkuarchal</title>
    <style>
        :root {
            --primary: #2563eb;
            --primary-dark: #1d4ed8;
            --bg: #f8fafc;
            --card-bg: #ffffff;
            --text: #1e293b;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg);
            margin: 0;
            padding-bottom: 100px;
            color: var(--text);
        }

        /* КРАСИВАЯ ШАПКА С ГРАДИЕНТОМ */
        header {
            padding: 50px 20px 80px;
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            color: white;
            border-radius: 0 0 45px 45px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(37, 99, 235, 0.2);
        }

        header h1 { margin: 0; font-size: 32px; font-weight: 900; letter-spacing: -1.5px; text-transform: lowercase; }
        header p { margin: 5px 0 0; opacity: 0.8; font-size: 14px; }

        /* КАРТОЧКА ПОГОДЫ С НАПЛЫВОМ */
        .weather-card {
            background: var(--card-bg);
            margin: -40px 20px 25px;
            padding: 22px;
            border-radius: 30px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.06);
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: relative;
            z-index: 10; /* Чтобы была выше шапки */
        }

        .temp { font-size: 36px; font-weight: 900; color: var(--primary); letter-spacing: -1px; }

        /* СЕТКА КНОПОК - ТЕПЕРЬ ОНИ ВЫГЛЯДЯТ ДОРОГО */
        .grid { 
            display: grid; 
            grid-template-columns: 1fr 1fr; 
            gap: 15px; 
            padding: 0 20px; 
            position: relative;
            z-index: 20; /* Кнопки ВСЕГДА сверху для кликов */
        }

        .card {
            background: var(--card-bg);
            padding: 25px 15px;
            border-radius: 32px;
            text-align: center;
            font-weight: 700;
            font-size: 15px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.03);
            transition: 0.2s;
            cursor: pointer;
            border: 1px solid #f1f5f9;
        }

        .card:active { transform: scale(0.92); background: #f8fafc; }

        /* КАРТОЧКИ С ДАННЫМИ ИЗ ТАБЛИЦЫ */
        #content-list { padding: 25px 20px; display: flex; flex-direction: column; gap: 15px; }
        .content-item {
            background: white;
            padding: 20px;
            border-radius: 28px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.02);
            border-left: 6px solid var(--primary);
            animation: fadeIn 0.4s ease-out;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .loader { text-align: center; padding: 40px; color: #94a3b8; font-size: 14px; }

        /* ТАББАР */
        .nav-bar {
            position: fixed;
            bottom: 0; width: 100%;
            height: 85px;
            background: rgba(255,255,255,0.95);
            backdrop-filter: blur(15px);
            display: flex;
            justify-content: space-around;
            align-items: center;
            box-shadow: 0 -10px 30px rgba(0,0,0,0.05);
            border-radius: 35px 35px 0 0;
            z-index: 1000;
        }

        .nav-link { font-size: 26px; text-decoration: none; color: #cbd5e1; transition: 0.3s; }
        .nav-link.active { color: var(--primary); transform: translateY(-8px); }
    </style>
</head>
<body>

<header>
    <h1>tkuarchal</h1>
    <p>город в твоем кармане</p>
</header>
<div class="weather-card">
    <div>
        <div style="font-size: 11px; color: #94a3b8; font-weight: 800; letter-spacing: 1px; margin-bottom: 4px;">LOCAL WEATHER</div>
        <div class="temp" id="temp">--°C</div>
    </div>
    <div style="font-size: 45px;">☀️</div>
</div>

<div class="grid">
    <div class="card" onclick="openSOS()" style="color: #ef4444; background: #fff1f2;">🚨 SOS</div>
    <div class="card" onclick="loadData('tourism')">🏔️ Туризм</div>
    <div class="card" onclick="loadData('sport')">⚽ Спорт</div>
    <div class="card" onclick="loadData('Службы')">📞 Службы</div>
</div>

<div id="content-list">
    <div class="loader">Нажмите категорию для загрузки</div>
</div>

<!-- Скрипт -->
<script>
    const APP_URL = "https://script.google.com";

    async function fetchWeather() {
        try {
            const res = await fetch("https://api.open-meteo.com");
            const data = await res.json();
            const t = Math.round(data.current_weather.temperature);
            document.getElementById('temp').innerText = (t > 0 ? '+' : '') + t + "°C";
        } catch (e) { document.getElementById('temp').innerText = "??°C"; }
    }

    async function loadData(tabName) {
        const container = document.getElementById('content-list');
        container.innerHTML = '<div class="loader">Синхронизация...</div>';
        
        try {
            const res = await fetch(${APP_URL}?type=${encodeURIComponent(tabName)});
            const data = await res.json();
            container.innerHTML = '';
            
            if (data && data.length > 0) {
                data.forEach(item => {
                    const v = Object.values(item);
                    container.innerHTML += 
                        <div class="content-item">
                            <h4 style="margin: 0 0 5px; font-weight: 800;">${v[0] || 'Инфо'}</h4>
                            <p style="margin: 0; color: #64748b; font-size: 14px;">${v[1] || ''}</p>
                        </div>
                    ;
                });
            } else { container.innerHTML = '<div class="loader">Пусто в разделе ' + tabName + '</div>'; }
        } catch (e) { container.innerHTML = '<div class="loader">Ошибка связи 🌐</div>'; }
    }

    // Для простоты SOS пока открывает Службы
    function openSOS() { loadData('Службы'); }

    window.onload = () => { fetchWeather(); loadData('tourism'); };
</script>

<nav class="nav-bar">
    <a href="#" class="nav-link active">🏠</a>
    <a href="#" class="nav-link">✉️</a>
    <a href="#" class="nav-link">📍</a>
    <a href="#" class="nav-link">👤</a>
</nav>

</body>
</html>
