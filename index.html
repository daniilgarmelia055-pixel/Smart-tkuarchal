<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Smart Tkuarchal</title>
    <style>
        :root { --primary: #2563eb; --primary-dark: #1d4ed8; --bg: #f8fafc; }
        body { font-family: -apple-system, system-ui, sans-serif; background-color: var(--bg); margin: 0; padding-bottom: 100px; overflow-x: hidden; }
        header { padding: 40px 25px 80px; background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%); color: white; border-radius: 0 0 45px 45px; text-align: center; box-shadow: 0 10px 30px rgba(37, 99, 235, 0.2); }
        header h1 { margin: 0; font-size: 32px; font-weight: 900; letter-spacing: -1.5px; text-transform: lowercase; }
        .weather-card { background: white; margin: -45px 20px 25px; padding: 22px; border-radius: 30px; box-shadow: 0 15px 35px rgba(0,0,0,0.06); display: flex; justify-content: space-between; align-items: center; position: relative; z-index: 10; }
        .temp { font-size: 36px; font-weight: 900; color: var(--primary); }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; padding: 0 20px; position: relative; z-index: 20; }
        .card { background: white; padding: 25px 15px; border-radius: 32px; text-align: center; font-weight: 700; box-shadow: 0 8px 20px rgba(0,0,0,0.03); cursor: pointer; border: 1px solid transparent; }
        .card:active { transform: scale(0.92); background: #f8fafc; }
        #content-list { padding: 25px 20px; display: flex; flex-direction: column; gap: 15px; }
        .content-item { background: white; padding: 20px; border-radius: 28px; box-shadow: 0 5px 15px rgba(0,0,0,0.02); border-left: 6px solid var(--primary); }
        .nav-bar { position: fixed; bottom: 0; width: 100%; height: 85px; background: rgba(255,255,255,0.95); backdrop-filter: blur(15px); display: flex; justify-content: space-around; align-items: center; box-shadow: 0 -10px 30px rgba(0,0,0,0.05); border-radius: 35px 35px 0 0; z-index: 1000; }
        .nav-link { font-size: 26px; text-decoration: none; color: #cbd5e1; }
        .nav-link.active { color: var(--primary); transform: translateY(-8px); }
        .loader { text-align: center; padding: 40px; color: #94a3b8; }
        .hidden { display: none; }
    </style>
</head>
<body>
<header>
    <h1 id="header-user">admin</h1>
    <p>добро пожаловать, <span id="u-name">user</span></p>
</header>
<div class="weather-card">
    <div><div style="font-size: 11px; color: #94a3b8; font-weight: 800;">ПОГОДА ТКУАРЧАЛ</div><div class="temp" id="temp">--°C</div></div>
    <div style="font-size: 45px;">☀️</div>
</div>
<div class="grid">
    <div class="card" onclick="openSOS()" style="color: #ef4444; background: #fff1f2;">🚨 SOS</div>
    <div class="card" onclick="initApp('tourism')">🏔️ Туризм</div>
    <div class="card" onclick="initApp('sport')">⚽ Спорт</div>
    <div id="admin-btn" class="card hidden" onclick="initApp('admin')">⚙️ Админ</div>
</div>
<div id="content-list"></div>
<nav class="nav-bar">
    <a href="#" class="nav-link active" onclick="initApp('tourism')">🏠</a>
    <a href="#" class="nav-link">✉️</a><a href="#" class="nav-link">📍</a><a href="#" class="nav-link">👤</a>
</nav>
<script src="script.js"></script>
</body>
</html>
