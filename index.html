<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Smart Tkuarchal</title>
    <!-- Ссылка на манифест для установки на телефон -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#4f46e5">
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 font-sans pb-20 select-none">

    <!-- Header -->
    <div class="bg-indigo-700 p-6 text-white flex justify-between items-center rounded-b-[40px] shadow-lg">
        <div>
            <h1 class="text-2xl font-black tracking-tight">Smart Tkuarchal</h1>
            <p class="text-xs opacity-90 font-medium">Ткуарчал • <span id="temp">+22°C</span></p>
        </div>
        <div class="w-12 h-12 bg-white/20 rounded-2xl flex items-center justify-center backdrop-blur-md">🔔</div>
    </div>

    <!-- Main Banner -->
    <div class="p-4 -mt-4">
        <div class="bg-gradient-to-br from-blue-600 to-indigo-800 rounded-[32px] p-6 text-white shadow-xl border border-white/10">
            <span class="bg-red-500 text-[10px] px-3 py-1 rounded-full font-bold uppercase tracking-widest">Сегодня в 18:00</span>
            <h2 class="text-xl font-bold mt-3 leading-tight">Финал по вольной борьбе</h2>
            <p class="text-sm opacity-80 mt-1">Стадион им. А. Чакветадзе</p>
            <button class="mt-5 w-full bg-white text-indigo-700 py-3 rounded-2xl text-sm font-bold shadow-lg active:scale-95 transition-all">Поддержать наших</button>
        </div>
    </div>

    <!-- Quick Menu -->
    <div class="px-6 grid grid-cols-4 gap-4 text-center mt-2">
        <div class="flex flex-col items-center group"><div class="w-16 h-16 bg-white rounded-[24px] shadow-sm flex items-center justify-center text-3xl mb-2 active:bg-gray-50 transition-colors">🏆</div><span class="text-[11px] font-bold text-gray-500">Спорт</span></div>
        <div class="flex flex-col items-center group"><div class="w-16 h-16 bg-white rounded-[24px] shadow-sm flex items-center justify-center text-3xl mb-2 active:bg-gray-50">🗞</div><span class="text-[11px] font-bold text-gray-500">Новости</span></div>
        <div class="flex flex-col items-center group"><div class="w-16 h-16 bg-white rounded-[24px] shadow-sm flex items-center justify-center text-3xl mb-2 active:bg-gray-50">💡</div><span class="text-[11px] font-bold text-gray-500">Идеи</span></div>
        <div class="flex flex-col items-center group"><div class="w-16 h-16 bg-white rounded-[24px] shadow-sm flex items-center justify-center text-3xl mb-2 active:bg-gray-50">🗺</div><span class="text-[11px] font-bold text-gray-500">Гид</span></div>
    </div>

    <!-- Emergency Services -->
    <div class="p-6">
        <h3 class="font-black text-gray-900 mb-4 px-1 text-lg">Экстренная помощь</h3>
        <div class="grid grid-cols-2 gap-4">
            <a href="tel:003" class="bg-red-500 p-5 rounded-[28px] shadow-lg shadow-red-100 flex flex-col gap-2 active:scale-95 transition-transform">
                <span class="text-2xl">🚑</span>
                <div><p class="text-[10px] text-white/70 uppercase font-black">Скорая</p><p class="text-xl font-black text-white">003</p></div>
            </a>
            <a href="tel:002" class="bg-blue-600 p-5 rounded-[28px] shadow-lg shadow-blue-100 flex flex-col gap-2 active:scale-95 transition-transform">
                <span class="text-2xl">👮</span>
                <div><p class="text-[10px] text-white/70 uppercase font-black">Милиция</p><p class="text-xl font-black text-white">002</p></div>
            </a>
        </div>
    </div>

    <!-- Tab Bar (Bottom Navigation) -->
    <div class="fixed bottom-6 left-6 right-6 bg-gray-900/90 backdrop-blur-xl h-16 rounded-[28px] flex items-center justify-around px-4 shadow-2xl">
        <div class="text-white text-xl">🏠</div>
        <div class="text-white/40 text-xl font-bold">💬</div>
        <div class="text-white/40 text-xl font-bold">👤</div>
    </div>

    <script>
        // Регистрация Service Worker для работы оффлайн
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js');
        }
    </script>
</body>
</html>
