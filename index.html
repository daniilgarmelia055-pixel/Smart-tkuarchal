<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AdminCity - Голос Города</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com">
    <style>
        body { background-color: #f8f9fa; font-family: 'Inter', sans-serif; }
        .card { background: white; border-radius: 30px; overflow: hidden; shadow: 0 10px 25px -5px rgba(0,0,0,0.1); }
        .like-btn { transition: all 0.3s ease; }
        .like-btn:active { transform: scale(1.4); color: #ef4444; }
        .admin-modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 1000; padding: 20px; color: white; overflow-y: auto; }
    </style>
</head>
<body class="pb-32">

    <!-- ШАПКА -->
    <div class="bg-indigo-700 p-8 text-white rounded-b-[45px] shadow-2xl mb-8">
        <div class="flex justify-between items-center">
            <div>
                <h1 class="text-3xl font-black italic tracking-tighter">admin</h1>
                <p class="text-[10px] opacity-70 font-bold uppercase tracking-widest">Твой город • Твой выбор</p>
            </div>
            <button onclick="openAdmin()" class="bg-white/20 p-4 rounded-3xl backdrop-blur-md">
                <i class="fa-solid fa-sliders text-white"></i>
            </button>
        </div>
    </div>

    <!-- МЕНЮ -->
    <div class="flex px-6 gap-4 mb-8">
        <button onclick="switchTab('tourism')" class="flex-1 bg-white p-4 rounded-3xl shadow-sm border border-indigo-50 flex flex-col items-center">
            <i class="fa-solid fa-camera-retro text-2xl text-indigo-500 mb-1"></i>
            <span class="text-[10px] font-black uppercase">Туризм</span>
        </button>
        <button onclick="switchTab('athletes')" class="flex-1 bg-white p-4 rounded-3xl shadow-sm border border-indigo-50 flex flex-col items-center">
            <i class="fa-solid fa-medal text-2xl text-orange-400 mb-1"></i>
            <span class="text-[10px] font-black uppercase">Спорт</span>
        </button>
    </div>

    <!-- ЛЕНТА КОНТЕНТА -->
    <div id="content-feed" class="px-6 space-y-8">
        <!-- Сюда подгружаются карточки с лайками -->
    </div>

    <!-- АДМИНКА -->
    <div id="admin-modal" class="admin-modal">
        <div class="max-w-md mx-auto py-10 space-y-6">
            <h2 class="text-2xl font-black text-yellow-400 uppercase italic">Панель Управления</h2>
            
            <div class="grid grid-cols-2 gap-2">
                <button onclick="showSection('add')" class="bg-indigo-600 p-4 rounded-2xl font-bold text-[10px] uppercase">Добавить пост</button>
                <button onclick="showSection('ideas')" class="bg-white/10 p-4 rounded-2xl font-bold text-[10px] uppercase">Идеи жителей</button>
            </div>

            <!-- Форма добавления -->
            <div id="add-form" class="space-y-4 pt-6">
                <select id="post-type" class="w-full p-5 rounded-2xl text-black font-bold outline-none">
                    <option value="tourism">В раздел ТУРИЗМ</option>
                    <option value="athletes">В раздел СПОРТ</option>
                </select>
                <input id="post-title" type="text" placeholder="Заголовок / Имя" class="w-full p-5 rounded-2xl text-black">
                <textarea id="post-desc" placeholder="Описание" class="w-full p-5 rounded-2xl text-black h-24"></textarea>
                <input id="post-phone" type="text" placeholder="Телефон для связи" class="w-full p-5 rounded-2xl text-black">
                <input type="file" id="post-file" class="hidden" accept="image/*">
                <button onclick="document.getElementById('post-file').click()" class="w-full border-2 border-dashed border-white/30 p-5 rounded-2xl text-sm font-bold italic">ВЫБРАТЬ ФОТОГРАФИЮ</button>
                <button id="upload-btn" onclick="saveToFirebase()" class="w-full bg-green-500 p-5 rounded-2xl font-black uppercase shadow-lg">Опубликовать на сайте</button>
            </div>

            <div id="ideas-list" class="hidden space-y-3"></div>

            <button onclick="closeAdmin()" class="w-full text-gray-500 font-bold uppercase text-xs pt-10 tracking-widest italic">Вернуться назад</button>
        </div>
    </div>

    <!-- ТАББАР -->
    <div class="fixed bottom-0 left-0 right-0 bg-white/80 backdrop-blur-xl p-6 flex justify-around items-center rounded-t-[40px] shadow-2xl border-t border-indigo-50">
        <i onclick="location.reload()" class="fa-solid fa-house text-2xl text-indigo-600"></i>
        <i onclick="sendIdea()" class="fa-solid fa-lightbulb text-2xl text-yellow-400"></i>
        <div class="bg-indigo-600 p-4 rounded-3xl -mt-16 border-8 border-f8f9fa shadow-xl">
            <i class="fa-solid fa-plus text-white text-xl"></i>
        </div>
        <i class="fa-solid fa-newspaper text-2xl text-gray-300"></i>
        <i class="fa-solid fa-user text-2xl text-gray-300"></i>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com";
        import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, serverTimestamp, doc, updateDoc, increment } from "https://www.gstatic.com";
        import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com";

        const firebaseConfig = {
            apiKey: "AIzaSyBkQRzRB9_hx0m7J-kcD4w6nbn6MKZnzLs",
            authDomain: "admincity-d8b19.firebaseapp.com",
            projectId: "admincity-d8b19",
            storageBucket: "admincity-d8b19.firebasestorage.app",
            appId: "1:460229255692:web:e79d69328016f3ee4bc429"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const storage = getStorage(app);

        // 1. ФУНКЦИЯ ЛАЙКА
        window.addLike = async (id, folder) => {
            const postRef = doc(db, folder, id);
            await updateDoc(postRef, { likes: increment(1) });
        };

        // 2. ПОДГРУЗКА КАРТОЧЕК
        window.switchTab = (folder) => {
            onSnapshot(query(collection(db, folder), orderBy("createdAt", "desc")), (snap) => {
                const feed = document.getElementById('content-feed');
                feed.innerHTML = '';
                snap.forEach(res => {
                    const data = res.data();
                    const id = res.id;
                    feed.innerHTML += `
                        <div class="card shadow-lg">
                            <img src="${data.image}" class="w-full h-64 object-cover">
                            <div class="p-6">
                                <div class="flex justify-between items-start mb-2">
                                    <h3 class="text-xl font-black uppercase italic text-gray-800 tracking-tighter">${data.title}</h3>
                                    <button onclick="addLike('${id}', '${folder}')" class="like-btn flex items-center gap-2 bg-red-50 px-4 py-2 rounded-2xl">
                                        <i class="fa-solid fa-heart text-red-500"></i>
                                        <span class="font-bold text-red-600">${data.likes || 0}</span>
                                    </button>
                                </div>
                                <p class="text-gray-500 text-sm leading-relaxed mb-6">${data.desc || ''}</p>
                                ${data.phone ? `<a href="tel:${data.phone}" class="block w-full bg-indigo-600 text-white text-center py-4 rounded-2xl font-black uppercase text-[10px] tracking-widest shadow-lg shadow-indigo-100">Связаться с гидом</a>` : ''}
                            </div>
                        </div>
                    `;
                });
            });
        };

        // 3. АДМИНКА И ЗАГРУЗКА
        window.openAdmin = () => { if(prompt("Пароль доступа:") === "777") document.getElementById('admin-modal').style.display = 'block'; };
        window.closeAdmin = () => document.getElementById('admin-modal').style.display = 'none';

        window.saveToFirebase = async () => {
            const file = document.getElementById('post-file').files[0];
            const title = document.getElementById('post-title').value;
            const folder = document.getElementById('post-type').value;
            const btn = document.getElementById('upload-btn');

            if(!file || !title) return alert("Заполни всё!");
            btn.disabled = true; btn.innerText = "ПУБЛИКУЕМ...";

            const fileRef = ref(storage, `${folder}/${Date.now()}_${file.name}`);
            await uploadBytes(fileRef, file);
            const url = await getDownloadURL(fileRef);

            await addDoc(collection(db, folder), {
                title: title.toUpperCase(),
                desc: document.getElementById('post-desc').value,
                phone: document.getElementById('post-phone').value,
                image: url,
                likes: 0,
                createdAt: serverTimestamp()
            });

            alert("Готово!"); closeAdmin();
        };

        window.sendIdea = async () => {
            const text = prompt("Твоя идея для города:");
            if(text) await addDoc(collection(db, "city_ideas"), { text, date: serverTimestamp() });
        };

        window.showSection = (mode) => {
            document.getElementById('add-form').classList.toggle('hidden', mode === 'ideas');
            document.getElementById('ideas-list').classList.toggle('hidden', mode === 'add');
            if(mode === 'ideas') {
                onSnapshot(query(collection(db, "city_ideas"), orderBy("date", "desc")), (snap) => {
                    const list = document.getElementById('ideas-list');
                    list.innerHTML = '';
                    snap.forEach(d => list.innerHTML += `<div class="bg-white/10 p-4 rounded-2xl text-xs border border-white/5 italic">"${d.data().text}"</div>`);
                });
            }
        };

        switchTab('tourism'); // Запуск по умолчанию
    </script>
</body>
</html>
