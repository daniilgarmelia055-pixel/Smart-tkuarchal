<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AdminCity</title>
    <!-- Подключаем стили и иконки принудительно -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com">
    <style>
        body { background-color: #f8faff; font-family: sans-serif; -webkit-tap-highlight-color: transparent; }
        .nav-item { display: flex; flex-direction: column; align-items: center; justify-content: center; width: 20%; color: #94a3b8; cursor: pointer; }
        .active-icon { color: #4f46e5; }
        .admin-modal { display: none; position: fixed; inset: 0; background: white; z-index: 9999; padding: 20px; overflow-y: auto; }
        .card { background: white; border-radius: 25px; box-shadow: 0 10px 20px rgba(0,0,0,0.05); margin-bottom: 20px; overflow: hidden; }
    </style>
</head>
<body class="pb-32">

    <!-- ШАПКА (2 кнопки внутри) -->
    <div class="bg-indigo-600 p-8 text-white rounded-b-[40px] shadow-lg flex justify-between items-center">
        <div>
            <h1 class="text-3xl font-black italic uppercase">admin</h1>
            <p class="text-[10px] font-bold opacity-80 uppercase tracking-widest">Твой город • Твой выбор</p>
        </div>
        <!-- КНОПКА 1: ВХОД В АДМИНКУ -->
        <button onclick="openAdmin()" class="bg-white/20 p-4 rounded-3xl"><i class="fa-solid fa-gear"></i></button>
    </div>

    <!-- ВЫБОР РАЗДЕЛА (КНОПКИ 2 И 3) -->
    <div class="flex gap-4 p-6">
        <button onclick="switchTab('tourism')" class="flex-1 bg-white p-5 rounded-[25px] shadow-sm font-black uppercase text-[12px] text-indigo-600 border border-indigo-50">Туризм</button>
        <button onclick="switchTab('athletes')" class="flex-1 bg-white p-5 rounded-[25px] shadow-sm font-black uppercase text-[12px] text-gray-400 border border-indigo-50">Спорт</button>
    </div>

    <!-- ЛЕНТА СОДЕРЖИМОГО (Здесь кнопки Лайков и Связи) -->
    <div id="content-list" class="px-6">
        <div class="text-center text-gray-300 py-20 italic">Загрузка данных из Firebase...</div>
    </div>

    <!-- НИЖНЕЕ МЕНЮ (КНОПКИ 4, 5, 6, 7, 8) -->
    <div class="fixed bottom-0 left-0 right-0 bg-white h-24 flex items-center justify-around shadow-[0_-10px_30px_rgba(0,0,0,0.05)] rounded-t-[35px] z-50">
        <div class="nav-item active-icon" onclick="location.reload()"><i class="fa-solid fa-house text-xl"></i></div>
        <div class="nav-item" onclick="sendIdea()"><i class="fa-solid fa-lightbulb text-xl text-yellow-500"></i></div>
        
        <!-- ЦЕНТРАЛЬНАЯ КНОПКА ПЛЮС (КНОПКА 6) -->
        <div class="bg-indigo-600 w-16 h-16 rounded-3xl flex items-center justify-center -mt-12 border-[6px] border-[#f8faff] shadow-xl text-white" onclick="openAdmin()">
            <i class="fa-solid fa-plus text-2xl"></i>
        </div>
        
        <div class="nav-item"><i class="fa-solid fa-newspaper text-xl"></i></div>
        <div class="nav-item"><i class="fa-solid fa-user text-xl"></i></div>
    </div>

    <!-- ОКНО АДМИНКИ (КНОПКИ 9, 10, 11, 12, 13) -->
    <div id="admin-modal" class="admin-modal">
        <div class="flex justify-between items-center mb-8">
            <h2 class="text-2xl font-black uppercase">Админка</h2>
            <button onclick="closeAdmin()" class="text-3xl text-gray-300">&times;</button>
        </div>

        <div class="space-y-4">
            <select id="f-type" class="w-full p-4 bg-gray-100 rounded-2xl font-bold">
                <option value="tourism">РАЗДЕЛ: ТУРИЗМ</option>
                <option value="athletes">РАЗДЕЛ: СПОРТ</option>
            </select>
            <input id="f-title" type="text" placeholder="Заголовок / Имя" class="w-full p-4 bg-gray-100 rounded-2xl">
            <textarea id="f-desc" placeholder="Описание" class="w-full p-4 bg-gray-100 rounded-2xl h-32"></textarea>
            <input id="f-phone" type="text" placeholder="Номер телефона (н-р: +7940...)" class="w-full p-4 bg-gray-100 rounded-2xl">
            
            <input type="file" id="f-file" class="hidden">
            <button onclick="document.getElementById('f-file').click()" class="w-full py-4 border-2 border-dashed border-indigo-200 rounded-2xl font-bold text-indigo-600">ВЫБРАТЬ ФОТО</button>
            
            <button id="f-btn" onclick="saveToFirebase()" class="w-full py-5 bg-indigo-600 text-white rounded-[25px] font-black uppercase shadow-lg shadow-indigo-200">Опубликовать</button>
            <hr class="my-6">
            <button onclick="viewIdeas()" class="w-full py-4 bg-yellow-500 text-white rounded-2xl font-bold uppercase">Посмотреть Идеи</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com";
        import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, serverTimestamp, doc, updateDoc, increment } from "https://www.gstatic.com";
        import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com";

        const firebaseConfig = {
            apiKey: "AIzaSyBkQRzRB9_hx0m7J-kcD4w6nbn6MKZnzLs",
            authDomain: "admincity-d8b19.firebaseapp.com",
            projectId: "admincity-d8b19",
            storageBucket: "admincity-d8b19.firebasestorage.app",
            appId: "1:460229255692:web:e79d69328016f3ee4bc429"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const storage = getStorage(app);

        // КНОПКА ЛАЙКА (КНОПКА 14)
        window.like = async (id, col) => {
            await updateDoc(doc(db, col, id), { likes: increment(1) });
        };

        // ПЕРЕКЛЮЧАТЕЛЬ (КНОПКИ 2 и 3)
        window.switchTab = (col) => {
            onSnapshot(query(collection(db, col), orderBy("createdAt", "desc")), (snap) => {
                const list = document.getElementById('content-list');
                list.innerHTML = '';
                snap.forEach(res => {
                    const d = res.data();
                    list.innerHTML += `
                        <div class="card">
                            <img src="${d.image}" class="w-full h-64 object-cover">
                            <div class="p-6">
                                <div class="flex justify-between items-center mb-4">
                                    <h3 class="text-xl font-bold uppercase italic">${d.title}</h3>
                                    <button onclick="like('${res.id}', '${col}')" class="flex items-center gap-2 bg-red-50 text-red-500 px-4 py-2 rounded-2xl font-bold">
                                        <i class="fa-solid fa-heart"></i> ${d.likes || 0}
                                    </button>
                                </div>
                                <p class="text-gray-400 text-sm mb-6">${d.desc || ''}</p>
                                ${d.phone ? `<a href="tel:${d.phone}" class="block w-full bg-indigo-600 text-white text-center py-4 rounded-2xl font-bold uppercase text-xs">Позвонить</a>` : ''}
                            </div>
                        </div>`;
                });
            });
        };

        // АДМИНКА
        window.openAdmin = () => { if(prompt("Пароль:") === "777") document.getElementById('admin-modal').style.display = 'block'; };
        window.closeAdmin = () => document.getElementById('admin-modal').style.display = 'none';

        window.saveToFirebase = async () => {
            const file = document.getElementById('f-file').files[0];
            const title = document.getElementById('f-title').value;
            const col = document.getElementById('f-type').value;
            if(!file || !title) return alert("Нужно фото и название!");

            const btn = document.getElementById('f-btn');
            btn.disabled = true; btn.innerText = "ЗАГРУЗКА...";

            const sRef = ref(storage, `files/${Date.now()}`);
            await uploadBytes(sRef, file);
            const url = await getDownloadURL(sRef);

            await addDoc(collection(db, col), {
                title: title.toUpperCase(),
                desc: document.getElementById('f-desc').value,
                phone: document.getElementById('f-phone').value,
                image: url,
                likes: 0,
                createdAt: serverTimestamp()
            });
            alert("Готово!"); closeAdmin();
        };

        window.sendIdea = async () => {
            const text = prompt("Ваша идея:");
            if(text) await addDoc(collection(db, "city_ideas"), { text, createdAt: serverTimestamp() });
        };

        window.viewIdeas = () => {
            onSnapshot(collection(db, "city_ideas"), (snap) => {
                let s = ""; snap.forEach(d => s += d.data().text + "\n---\n"); alert("СПИСОК ИДЕЙ:\n\n" + s);
            });
        };

        switchTab('tourism');
    </script>
</body>
</html>
