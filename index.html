 <!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Smart Tkuarchal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { -webkit-tap-highlight-color: transparent; font-family: ui-sans-serif, system-ui; }
        .page { display: none; }
        .page.active { display: block; }
        .modal-show { transform: translateY(0) !important; opacity: 1 !important; }
    </style>
</head>
<body class="bg-gray-50 pb-24 select-none">

    <!-- HEADER -->
    <div class="bg-indigo-700 p-6 pb-10 text-white flex justify-between items-center rounded-b-[40px] shadow-lg mb-6">
        <div>
            <h1 id="header-user" class="text-2xl font-bold">Smart Tkuarchal</h1>
            <p class="text-indigo-200 text-sm">Город в твоем кармане</p>
        </div>
        <div class="flex gap-2">
            <!-- Кнопка админа (скрыта) -->
            <button id="admin-btn" onclick="openAdmin()" class="hidden bg-yellow-400 p-3 rounded-2xl shadow-lg active:scale-90 transition">⚙️</button>
            <button onclick="openNotif()" class="relative bg-indigo-600 p-3 rounded-2xl active:scale-90 transition">
                🔔 <span id="notif-dot" class="absolute top-2 right-2 w-2 h-2 bg-red-500 rounded-full"></span>
            </button>
        </div>
    </div>

    <!-- ГЛАВНАЯ -->
    <main id="home" class="page active px-6 space-y-6">
        <!-- ГЛАВНАЯ НОВОСТЬ ОТ АДМИНА -->
        <div class="bg-indigo-600 p-6 rounded-[32px] text-white shadow-xl">
            <p class="text-[10px] uppercase font-bold opacity-60 mb-1">Важное сегодня</p>
            <h2 id="live-news" class="text-lg font-medium">Добро пожаловать в Ткуарчал!</h2>
        </div>

        <!-- ЖИВАЯ ПОГОДА -->
        <div class="bg-white p-5 rounded-3xl shadow-sm border border-gray-100 flex justify-between items-center">
            <div id="w-loading" class="animate-pulse w-full h-12 bg-gray-100 rounded-xl"></div>
            <div id="w-content" class="hidden flex justify-between w-full items-center">
                <div>
                    <p class="text-gray-400 text-[10px] font-bold uppercase">Ткуарчал</p>
                    <h2 id="temp" class="text-3xl font-black text-gray-800">--°C</h2>
                    <p id="desc" class="text-gray-500 text-sm">Обновление...</p>
                </div>
                <div id="icon" class="text-4xl">☀️</div>
            </div>
        </div>

        <!-- СЕТКА СЕРВИСОВ -->
        <div class="grid grid-cols-2 gap-4">
            <div onclick="openModal('transport')" class="bg-blue-50 p-6 rounded-3xl text-center active:scale-95 transition">
                <div class="text-3xl mb-1">🚌</div>
                <span class="text-blue-900 font-bold text-xs uppercase">Транспорт</span>
            </div>
            <div onclick="alert('Скоро добавим достопримечательности!')" class="bg-emerald-50 p-6 rounded-3xl text-center active:scale-95 transition">
                <div class="text-3xl mb-1">🏔️</div>
                <span class="text-emerald-900 font-bold text-xs uppercase">Туризм</span>
            </div>
        </div>
    </main>

    <!-- ПРОФИЛЬ -->
    <main id="profile" class="page px-6 pt-10 text-center">
        <div id="login-box" class="bg-white p-8 rounded-[40px] shadow-sm">
            <div class="text-5xl mb-4">👋</div>
            <h2 class="text-xl font-bold mb-4">Представьтесь</h2>
            <input type="text" id="name-in" placeholder="Ваше имя" class="w-full p-4 bg-gray-50 rounded-2xl border-none mb-4 focus:ring-2 focus:ring-indigo-500">
            <button onclick="login()" class="w-full bg-indigo-600 text-white p-4 rounded-2xl font-bold">Войти</button>
            <p class="mt-4 text-[10px] text-gray-400 uppercase tracking-widest">Админ: Admin</p>
        </div>
        <div id="user-box" class="hidden">
            <div class="w-24 h-24 bg-indigo-100 rounded-full mx-auto mb-4 flex items-center justify-center text-4xl">👤</div>
            <h2 id="u-name" class="text-2xl font-bold">Гость</h2>
            <button onclick="logout()" class="mt-8 text-red-400 font-bold">ВЫЙТИ</button>
        </div>
    </main>

    <!-- МОДАЛКИ -->
    <div id="modal-overlay" class="fixed inset-0 bg-black/50 z-50 hidden backdrop-blur-sm transition-all flex items-end">
        <div id="modal-box" class="bg-white w-full rounded-t-[40px] p-8 translate-y-full transition-transform duration-300">
            <div class="flex justify-between items-center mb-6">
                <h3 id="modal-title" class="text-xl font-bold">Информация</h3>
                <button onclick="closeModal()" class="text-2xl">✕</button>
            </div>
            <div id="modal-body" class="space-y-4"></div>
        </div>
    </div>

    <!-- АДМИН ПАНЕЛЬ -->
    <div id="admin-modal" class="fixed inset-0 bg-indigo-900/90 z-[60] hidden flex items-center p-6">
        <div class="bg-white w-full rounded-[32px] p-6">
            <h2 class="text-xl font-bold mb-4">Пульт управления</h2>
            <textarea id="news-edit" class="w-full p-4 bg-gray-100 rounded-xl mb-4" rows="3" placeholder="Текст новости..."></textarea>
            <button onclick="saveAdminNews()" class="w-full bg-green-500 text-white p-4 rounded-xl font-bold">ОБНОВИТЬ У ВСЕХ</button>
            <button onclick="closeAdmin()" class="w-full mt-2 text-gray-400 py-2">Отмена</button>
        </div>
    </div>

    <!-- МЕНЮ -->
    <nav class="fixed bottom-0 inset-x-0 bg-white/80 backdrop-blur-lg border-t flex justify-around p-4 rounded-t-3xl shadow-2xl">
        <button onclick="showPage('home')" class="text-2xl">🏠</button>
        <button onclick="showPage('profile')" class="text-2xl">👤</button>
    </nav>

    <script>
        // 1. Погода
        async function loadWeather() {
            try {
                const res = await fetch('https://api.open-meteo.com');
                const data = await res.json();
                document.getElementById('w-loading').classList.add('hidden');
                document.getElementById('w-content').classList.remove('hidden');
                document.getElementById('temp').innerText = Math.round(data.current_weather.temperature) + '°C';
                document.getElementById('desc').innerText = "В Ткуарчале отлично";
            } catch(e) { console.error("Погода не загрузилась"); }
        }

        // 2. Навигация и Модалки
        function showPage(id) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        function openModal(type) {
            const body = document.getElementById('modal-body');
            const overlay = document.getElementById('modal-overlay');
            const box = document.getElementById('modal-box');
            
            if(type === 'transport') {
                document.getElementById('modal-title').innerText = 'Расписание 🚌';
                body.innerHTML = `<div class="p-4 bg-gray-50 rounded-2xl flex justify-between"><b>Ткуарчал - Сухум</b><span>08:00</span></div>
                                  <div class="p-4 bg-gray-50 rounded-2xl flex justify-between"><b>Ткуарчал - Очамчыра</b><span>12:00</span></div>`;
            }
            overlay.classList.remove('hidden');
            setTimeout(() => box.classList.add('modal-show'), 10);
        }

        function closeModal() {
            document.getElementById('modal-box').classList.remove('modal-show');
            setTimeout(() => document.getElementById('modal-overlay').classList.add('hidden'), 300);
        }

        // 3. Логика Профиля и Админа
        function login() {
            const name = document.getElementById('name-in').value;
            if(name) {
                localStorage.setItem('tk_user', name);
                initApp();
                showPage('home');
            }
        }

        function logout() {
            localStorage.clear();
            location.reload();
        }

        function initApp() {
            const user = localStorage.getItem('tk_user');
            const news = localStorage.getItem('tk_news') || "Добро пожаловать в Ткуарчал!";
            document.getElementById('live-news').innerText = news;

            if(user) {
                document.getElementById('login-box').classList.add('hidden');
                document.getElementById('user-box').classList.remove('hidden');
                document.getElementById('u-name').innerText = user;
                document.getElementById('header-user').innerText = 'Привет, ' + user;
                if(user.toLowerCase() === 'admin') document.getElementById('admin-btn').classList.remove('hidden');
            }
        }

        function openAdmin() { document.getElementById('admin-modal').classList.remove('hidden'); }
        function closeAdmin() { document.getElementById('admin-modal').classList.add('hidden'); }

        function saveAdminNews() {
            const txt = document.getElementById('news-edit').value;
            if(txt) {
                localStorage.setItem('tk_news', txt); // Сохраняем "в облако" (имитация)
                document.getElementById('live-news').innerText = txt;
                alert("Опубликовано!");
                closeAdmin();
            }
        }

        window.onload = () => { initApp(); loadWeather(); };
    </script>
</body>
</html>
