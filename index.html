<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Smart Tkuarchal</title>
    <style>
        :root {
            --primary: #2563eb;
            --primary-dark: #1d4ed8;
            --bg: #f1f5f9;
            --card-bg: #ffffff;
            --text: #0f172a;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg);
            margin: 0;
            padding-bottom: 100px;
            color: var(--text);
        }

        /* Тот самый градиентный Header */
        header {
            padding: 40px 25px 80px;
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            color: white;
            border-radius: 0 0 45px 45px;
            box-shadow: 0 10px 30px rgba(37, 99, 235, 0.2);
        }

        header h1 { margin: 0; font-size: 32px; font-weight: 900; letter-spacing: -1.5px; text-transform: lowercase; }
        header p { margin: 5px 0 0; opacity: 0.8; font-size: 14px; font-weight: 500; }

        /* Эффект наплыва погоды */
        .weather-card {
            background: var(--card-bg);
            margin: -45px 20px 25px;
            padding: 22px;
            border-radius: 30px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.06);
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid rgba(255,255,255,0.8);
        }

        .temp { font-size: 38px; font-weight: 900; color: var(--primary); letter-spacing: -1px; }

        /* Кнопки меню */
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; padding: 0 20px; }
        .card {
            background: var(--card-bg);
            padding: 25px 15px;
            border-radius: 32px;
            text-align: center;
            font-weight: 700;
            font-size: 15px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.03);
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            border: 1px solid transparent;
        }

        .card:active { transform: scale(0.92); background: #f8fafc; border-color: #e2e8f0; }

        /* Карточки контента из таблицы */
        #content-list { padding: 25px 20px; display: flex; flex-direction: column; gap: 15px; }
        .content-item {
            background: white;
            padding: 20px;
            border-radius: 28px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.02);
            border-left: 6px solid var(--primary);
            animation: fadeIn 0.4s ease-out;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .content-item h4 { margin: 0 0 6px; font-size: 18px; font-weight: 800; color: #1e293b; }
        .content-item p { margin: 0; color: #64748b; font-size: 14px; line-height: 1.5; }

        /* SOS Меню */
        #modal-sos { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(15, 23, 42, 0.7); backdrop-filter: blur(8px); z-index: 2000; align-items: flex-end; }
        .modal-body { background: white; width: 100%; padding: 35px 25px; border-radius: 45px 45px 0 0; max-height: 80vh; overflow-y: auto; box-sizing: border-box; }
        .sos-btn { display: flex; justify-content: space-between; align-items: center; padding: 22px; background: #fff1f2; margin-bottom: 15px; border-radius: 24px; color: #e11d48; text-decoration: none; font-weight: 800; border: 1px solid #ffe4e6; }

        /* Таббар внизу */
        .nav-bar {
            position: fixed;
            bottom: 0; width: 100%;
            height: 85px;
            background: rgba(255,255,255,0.95);
            backdrop-filter: blur(15px);
            display: flex;
            justify-content: space-around;
            align-items: center;
            box-shadow: 0 -10px 30px rgba(0,0,0,0.05);
            border-radius: 35px 35px 0 0;
        }.nav-link { font-size: 26px; text-decoration: none; color: #94a3b8; transition: 0.3s; }
        .nav-link.active { color: var(--primary); transform: translateY(-8px); }
        
        .loader { text-align: center; padding: 40px; color: #94a3b8; font-weight: 500; }
    </style>
</head>
<body>

<header>
    <h1 id="view-title">tkuarchal</h1>
    <p>город в твоем кармане</p>
</header>

<div class="weather-card">
    <div><div style="font-size: 11px; color: #94a3b8; font-weight: 800; letter-spacing: 1px; margin-bottom: 4px;">LOCAL WEATHER</div><div class="temp" id="temp">--°C</div></div>
    <div style="font-size: 45px; filter: drop-shadow(0 5px 10px rgba(255,165,0,0.3));">☀️</div>
</div>

<div class="grid">
    <div class="card" onclick="openSOS()" style="color: #e11d48; background: #fff1f2;">🚨 SOS</div>
    <div class="card" onclick="loadData('tourism')">🏔️ Туризм</div>
    <div class="card" onclick="loadData('sport')">⚽ Спорт</div>
    <div class="card" onclick="loadData('Службы')">📞 Службы</div>
</div>

<div id="content-list"></div>

<div id="modal-sos" onclick="closeSOS()">
    <div class="modal-body" onclick="event.stopPropagation()">
        <div style="width: 40px; height: 5px; background: #e2e8f0; border-radius: 10px; margin: 0 auto 25px;"></div>
        <h2 style="color: #e11d48; margin: 0 0 25px; font-size: 24px; font-weight: 900;">Службы спасения</h2>
        <div id="sos-list"></div>
        <button onclick="closeSOS()" style="width: 100%; padding: 20px; border-radius: 22px; border: none; background: #f1f5f9; color: #64748b; font-weight: 800; font-size: 16px; margin-top: 10px;">ЗАКРЫТЬ</button>
    </div>
</div>

<nav class="nav-bar">
    <a href="#" class="nav-link active" onclick="loadData('tourism')">🏠</a>
    <a href="#" class="nav-link">✉️</a>
    <a href="#" class="nav-link">📍</a>
    <a href="#" class="nav-link">👤</a>
</nav>

<script>
    const APP_URL = "https://script.google.com";

    async function fetchWeather() {
        try {
            const res = await fetch("https://api.open-meteo.com");
            const data = await res.json();
            const t = Math.round(data.current_weather.temperature);
            document.getElementById('temp').innerText = (t > 0 ? '+' : '') + t + "°C";
        } catch (e) { document.getElementById('temp').innerText = "??°C"; }
    }

    async function loadData(tabName) {
        const container = document.getElementById('content-list');
        document.getElementById('view-title').innerText = tabName.toLowerCase();
        container.innerHTML = '<div class="loader">Синхронизация...</div>';
        
        try {
            const res = await fetch(${APP_URL}?type=${encodeURIComponent(tabName)});
            const data = await res.json();
            container.innerHTML = '';
            
            if (data && data.length > 0) {
                data.forEach(item => {
                    const v = Object.values(item);
                    container.innerHTML += 
                        <div class="content-item">
                            <h4>${v[0] || 'Информация'}</h4>
                            <p>${v[1] || ''}</p>
                        </div>
                    ;
                });
            } else { container.innerHTML = '<div class="loader">Тут пока пусто 🍃</div>'; }
        } catch (e) { container.innerHTML = '<div class="loader">Ошибка соединения 🌐</div>'; }
    }

    async function openSOS() {
        document.getElementById('modal-sos').style.display = 'flex';
        const list = document.getElementById('sos-list');
        list.innerHTML = '<div class="loader">Вызов базы...</div>';
        try {
            const res = await fetch(${APP_URL}?type=${encodeURIComponent('Службы')});
            const data = await res.json();
            list.innerHTML = '';
