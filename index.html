<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Smart Tkuarchal</title>
    <style>
        :root { --primary: #2563eb; --bg: #f8fafc; }
        body { font-family: sans-serif; background: var(--bg); margin: 0; padding-bottom: 100px; }
        
        /* Простая шапка без наложений */
        header { padding: 30px 20px; background: var(--primary); color: white; text-align: center; }
        
        /* Погода просто блоком ниже */
        .weather-box { background: white; margin: 15px; padding: 15px; border-radius: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); display: flex; justify-content: space-between; align-items: center; }
        .temp { font-size: 28px; font-weight: 800; color: var(--primary); }

        /* СЕТКА КНОПОК - МАКСИМАЛЬНАЯ ДОСТУПНОСТЬ */
        .main-grid { 
            display: grid; 
            grid-template-columns: 1fr 1fr; 
            gap: 12px; 
            padding: 15px; 
            position: relative;
            z-index: 1000; /* Гарантируем, что кнопки сверху */
        }

        .btn-card { 
            background: #ffffff; 
            padding: 25px 10px; 
            border-radius: 20px; 
            text-align: center; 
            font-weight: 700; 
            box-shadow: 0 4px 8px rgba(0,0,0,0.08); 
            border: 2px solid #e2e8f0; /* Сделаем рамку, чтобы видеть границы */
            cursor: pointer;
            display: block; /* Чтобы кнопка занимала все место */
            -webkit-appearance: none;
        }

        .btn-card:active { background: #e2e8f0; transform: scale(0.95); }

        /* Список */
        #data-container { padding: 15px; }
        .data-item { background: white; padding: 15px; border-radius: 15px; margin-bottom: 10px; border-left: 5px solid var(--primary); box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .status { text-align: center; padding: 20px; color: #64748b; font-style: italic; }

        /* SOS */
        #sos-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 9999; align-items: flex-end; }
        .sos-content { background: white; width: 100%; padding: 25px; border-radius: 25px 25px 0 0; box-sizing: border-box; }
    </style>
</head>
<body>

<header>
    <h1>tkuarchal</h1>
</header>

<div class="weather-box">
    <div><div style="font-size: 11px; color: #94a3b8;">ПОГОДА</div><div class="temp" id="t-val">--°C</div></div>
    <div style="font-size: 35px;">☀️</div>
</div>

<div class="main-grid">
    <!-- Используем новые классы и явные onclick -->
    <div class="btn-card" style="color: #ef4444; border-color: #fecaca;" onclick="openEmergency()">🚨 SOS</div>
    <div class="btn-card" onclick="getData('tourism')">🏔️ Туризм</div>
    <div class="btn-card" onclick="getData('sport')">⚽ Спорт</div>
    <div class="btn-card" onclick="getData('Службы')">📞 Службы</div>
</div>

<div id="data-container">
    <div class="status">Нажмите кнопку для загрузки...</div>
</div>

<div id="sos-overlay" onclick="this.style.display='none'">
    <div class="sos-content" onclick="event.stopPropagation()">
        <h2 style="color: #ef4444;">Службы спасения</h2>
        <div id="sos-list"></div>
        <button onclick="document.getElementById('sos-overlay').style.display='none'" style="width: 100%; padding: 15px; border-radius: 10px; border: none; background: #f1f5f9; font-weight: 700; margin-top: 15px;">ЗАКРЫТЬ</button>
    </div>
</div>

<script>
    const EXEC_URL = "https://script.google.com";

    // Функция загрузки
    async function getData(category) {
        const box = document.getElementById('data-container');
        box.innerHTML = <div class="status">⏳ Загружаю "${category}"...</div>;try {
            const response = await fetch(${EXEC_URL}?type=${encodeURIComponent(category)});
            const json = await response.json();
            
            box.innerHTML = '';
            if (json && json.length > 0) {
                json.forEach(item => {
                    const v = Object.values(item);
                    box.innerHTML += <div class="data-item"><b>${v[0]}</b><br><small style="color: #64748b">${v[1] || ''}</small></div>;
                });
            } else {
                box.innerHTML = <div class="status">❌ Вкладка "${category}" пуста или не найдена.</div>;
            }
        } catch (err) {
            box.innerHTML = '<div class="status">⚠️ Ошибка соединения с таблицей.</div>';
        }
    }

    // Погода
    async function getW() {
        try {
            const r = await fetch("https://api.open-meteo.com");
            const d = await r.json();
            document.getElementById('t-val').innerText = Math.round(d.current_weather.temperature) + "°C";
        } catch (e) {}
    }

    // SOS
    async function openEmergency() {
        document.getElementById('sos-overlay').style.display = 'flex';
        const sList = document.getElementById('sos-list');
        sList.innerHTML = '<div class="status">Загрузка номеров...</div>';
        try {
            const r = await fetch(${EXEC_URL}?type=Службы);
            const j = await r.json();
            sList.innerHTML = '';
            j.forEach(item => {
                const v = Object.values(item);
                sList.innerHTML += <a href="tel:${v[1]}" style="display: block; padding: 15px; background: #fff1f2; margin-bottom: 8px; border-radius: 10px; color: #e11d48; text-decoration: none; font-weight: 700;">${v[0]}: ${v[1]} 📞</a>;
            });
        } catch (e) { sList.innerHTML = 'Ошибка'; }
    }

    window.onload = () => { getW(); getData('tourism'); };
</script>

</body>
</html>
