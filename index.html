<nav class="nav-bar">
    <a href="#" class="nav-link active" onclick="loadData('tourism')">🏠</a>
    <a href="#" class="nav-link">📩</a>
    <a href="#" class="nav-link">🗺️</a>
    <a href="#" class="nav-link">👤</a>
</nav>

<script>
    // Твоя ссылка уже вставлена!
    const APP_URL = "https://script.google.com"; 

    async function fetchWeather() {
        try {
            const res = await fetch("https://api.open-meteo.com");
            const data = await res.json();
            const t = Math.round(data.current_weather.temperature);
            document.getElementById('temp').innerText = (t > 0 ? '+' : '') + t + "°C";
        } catch (e) { document.getElementById('temp').innerText = "err°C"; }
    }

    async function loadData(tabName) {
        const container = document.getElementById('content-list');
        document.getElementById('view-title').innerText = tabName.toLowerCase();
        container.innerHTML = '<div class="loader">Загрузка данных...</div>';
        try {
            const res = await fetch(${APP_URL}?type=${encodeURIComponent(tabName)});
            const data = await res.json();
            container.innerHTML = '';
            if (data && data.length > 0) {
                data.forEach(item => {
                    const v = Object.values(item);
                    container.innerHTML += <div class="content-card"><h4>${v[0]}</h4><p>${v[1]}</p></div>;
                });
            } else { container.innerHTML = '<div class="loader">Тут пока пусто</div>'; }
        } catch (e) { container.innerHTML = '<div class="loader">Ошибка ссылки</div>'; }
    }

    async function openSOS() {
        document.getElementById('modal-sos').style.display = 'flex';
        const list = document.getElementById('sos-list');
        list.innerHTML = '<div class="loader">Загрузка...</div>';
        try {
            const res = await fetch(${APP_URL}?type=${encodeURIComponent('Службы')});
            const data = await res.json();
            list.innerHTML = '';
            data.forEach(item => {
                const v = Object.values(item);
                list.innerHTML += <a href="tel:${v[1]}" class="sos-item"><span>${v[0]}</span><span>${v[1]} 📞</span></a>;
            });
        } catch (e) { list.innerHTML = '<div class="loader">Ошибка загрузки</div>'; }
    }

    function closeSOS() { document.getElementById('modal-sos').style.display = 'none'; }

    window.onload = () => { fetchWeather(); loadData('tourism'); };
</script>
</body>
</html>
