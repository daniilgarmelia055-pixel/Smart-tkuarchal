<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Smart Tkuarchal</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#4f46e5">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Убираем выделение текста при нажатии на мобильных */
        body { -webkit-tap-highlight-color: transparent; }
        .page { display: none; }
        .page.active { display: block; }
        .nav-active { color: #4f46e5; transform: scale(1.1); }
    </style>
</head>
<body class="bg-gray-50 font-sans pb-24 select-none">

    <!-- Header -->
    <div class="bg-indigo-700 p-6 pb-10 text-white flex justify-between items-center rounded-b-[40px] shadow-lg mb-6">
        <div>
            <h1 class="text-2xl font-bold">Smart Tkuarchal</h1>
            <p class="text-indigo-200 text-sm">Твой город в кармане</p>
        </div>
        <button onclick="alert('Уведомлений пока нет')" class="bg-indigo-600 p-3 rounded-2xl shadow-inner active:scale-90 transition">
            🔔
        </button>
    </div>

    <!-- Страница: ГЛАВНАЯ -->
    <main id="home" class="page active px-6 space-y-6">
        <!-- Погода -->
        <div class="bg-white p-5 rounded-3xl shadow-sm border border-gray-100 flex justify-between items-center">
            <div>
                <p class="text-gray-400 text-xs uppercase font-bold tracking-wider">Погода в Ткуарчале</p>
                <h2 class="text-3xl font-bold text-gray-800">+22°C</h2>
                <p class="text-gray-500 text-sm">Солнечно, легкий бриз</p>
            </div>
            <div class="text-4xl">☀️</div>
        </div>

        <!-- Сетка кнопок -->
        <div class="grid grid-cols-2 gap-4">
            <div onclick="alert('Расписание автобусов загружается...')" class="bg-indigo-50 p-6 rounded-3xl text-center border border-indigo-100 active:scale-95 transition cursor-pointer">
                <div class="text-4xl mb-2">🚌</div>
                <span class="text-indigo-900 font-bold text-sm">Транспорт</span>
            </div>
            <div onclick="alert('Маршруты к водопадам скоро появятся')" class="bg-emerald-50 p-6 rounded-3xl text-center border border-emerald-100 active:scale-95 transition cursor-pointer">
                <div class="text-4xl mb-2">🏔️</div>
                <span class="text-emerald-900 font-bold text-sm">Туризм</span>
            </div>
            <div onclick="alert('Справочник ЖКХ')" class="bg-orange-50 p-6 rounded-3xl text-center border border-orange-100 active:scale-95 transition cursor-pointer">
                <div class="text-4xl mb-2">🛠️</div>
                <span class="text-orange-900 font-bold text-sm">Услуги</span>
            </div>
            <div onclick="alert('Новости города')" class="bg-blue-50 p-6 rounded-3xl text-center border border-blue-100 active:scale-95 transition cursor-pointer">
                <div class="text-4xl mb-2">📰</div>
                <span class="text-blue-900 font-bold text-sm">Новости</span>
            </div>
        </div>
    </main>

    <!-- Страница: СОБЫТИЯ (скрыта по умолчанию) -->
    <main id="events" class="page px-6 text-center pt-10">
        <h2 class="text-xl font-bold text-gray-800">Предстоящие события</h2>
        <p class="text-gray-500 mt-2">В городе пока всё спокойно.</p>
    </main>

    <!-- Страница: ПРОФИЛЬ (скрыта по умолчанию) -->
    <main id="profile" class="page px-6 text-center pt-10">
        <div class="w-24 h-24 bg-indigo-100 rounded-full mx-auto mb-4 flex items-center justify-center text-4xl">👤</div>
        <h2 class="text-xl font-bold text-gray-800">Гость</h2>
        <button class="mt-4 bg-indigo-600 text-white px-6 py-2 rounded-xl">Войти</button>
    </main>

    <!-- Нижняя навигация -->
    <nav class="fixed bottom-0 left-0 right-0 bg-white/80 backdrop-blur-lg border-t border-gray-200 px-10 py-4 flex justify-between items-center rounded-t-[32px] shadow-[0_-5px_20px_rgba(0,0,0,0.05)]">
        <button onclick="showPage('home', this)" class="nav-btn nav-active flex flex-col items-center transition duration-300">
            <span class="text-2xl">🏠</span>
            <span class="text-[10px] font-bold">Главная</span>
        </button>
        <button onclick="showPage('events', this)" class="nav-btn text-gray-400 flex flex-col items-center transition duration-300">
            <span class="text-2xl">📅</span>
            <span class="text-[10px] font-bold">События</span>
        </button>
        <button onclick="showPage('profile', this)" class="nav-btn text-gray-400 flex flex-col items-center transition duration-300">
            <span class="text-2xl">👤</span>
            <span class="text-[10px] font-bold">Профиль</span>
        </button>
    </nav>

    <script>
        function showPage(pageId, btn) {
            // Скрываем все страницы
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            // Показываем нужную
            document.getElementById(pageId).classList.add('active');
            
            // Сбрасываем стиль всех кнопок навигации
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('nav-active', 'text-indigo-600'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.add('text-gray-400'));
            
            // Активная кнопка
            btn.classList.add('nav-active');
            btn.classList.remove('text-gray-400');
        }
    </script>

</body>
</html>
