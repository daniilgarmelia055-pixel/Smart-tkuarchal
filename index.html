<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Admin App</title>
    <style>
        body { font-family: -apple-system, sans-serif; background: #f8f9ff; margin: 0; padding-bottom: 100px; overflow-x: hidden; }
        
        /* ШАПКА */
        .header { 
            background: linear-gradient(135deg, #4b39ef 0%, #39d2c0 100%); 
            padding: 40px 20px 50px; 
            color: white; 
            border-radius: 0 0 40px 40px; 
        }
        .header-top { display: flex; align-items: center; gap: 15px; }
        .header h1 { margin: 0; font-size: 26px; font-weight: 900; text-transform: lowercase; }
        .header p { margin: 0; font-size: 10px; opacity: 0.8; letter-spacing: 1px; text-transform: uppercase; font-weight: bold; }

        /* КНОПКА НАЗАД */
        #back-btn { 
            display: none; cursor: pointer; background: rgba(255,255,255,0.2); 
            padding: 8px; border-radius: 12px; backdrop-filter: blur(10px); 
        }

        /* СТОРИС */
        .stories { display: flex; padding: 20px; gap: 15px; overflow-x: auto; scrollbar-width: none; }
        .stories::-webkit-scrollbar { display: none; }
        .story { min-width: 70px; text-align: center; }
        .story-ring { 
            width: 64px; height: 64px; border-radius: 50%; 
            background: linear-gradient(45deg, #f09433, #bc1888); 
            padding: 3px; margin: 0 auto 5px; 
        }
        .story img { width: 64px; height: 64px; border-radius: 50%; background: white; object-fit: cover; }
        .story span { font-size: 10px; font-weight: bold; color: #555; }

        /* Погода */
        .weather { 
            background: white; margin: 0 20px 20px; padding: 20px; 
            border-radius: 30px; display: flex; justify-content: space-between; 
            align-items: center; box-shadow: 0 5px 15px rgba(0,0,0,0.05); 
        }
        .temp { font-size: 32px; font-weight: 900; }

        /* Кнопки */
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; padding: 0 20px; }
        .card { 
            background: white; border-radius: 35px; padding: 30px 10px; 
            display: flex; flex-direction: column; align-items: center; 
            box-shadow: 0 10px 20px rgba(0,0,0,0.04); transition: 0.2s;
        }
        .card:active { transform: scale(0.95); }
        .card img { width: 52px; height: 52px; margin-bottom: 12px; }
        .card span { font-weight: 800; font-size: 13px; color: #333; }

        /* Нижнее меню */
        .nav { 
            position: fixed; bottom: 0; width: 100%; background: white; 
            display: flex; justify-content: space-around; padding: 15px 0 25px; 
            box-shadow: 0 -5px 15px rgba(0,0,0,0.05); border-radius: 25px 25px 0 0;
        }

        /* Экран контента */
        #content-screen { display: none; padding: 50px 20px; text-align: center; color: #aaa; }
    </style>
</head>
<body>

    <div class="header">
        <div class="header-top">
            <div id="back-btn" onclick="goBack()">
                <img src="https://img.icons8.com" width="20">
            </div>
            <div>
                <h1 id="title">admin</h1>
                <p id="subtitle">ГОРОД В ТВОЕМ КАРМАНЕ</p>
            </div>
        </div>
    </div>

    <div id="main-ui">
        <div class="stories">
            <div class="story">
                <div class="story-ring"><img src="https://img.icons8.com"></div>
                <span>НОВОСТИ</span>
            </div>
            <div class="story">
                <div class="story-ring"><img src="https://img.icons8.com"></div>
                <span>ОТДЫХ</span>
            </div>
        </div>

        <div class="weather">
            <div>
                <small style="color:#aaa; font-size: 10px; font-weight: bold;">ПОГОДА ТКУАРЧАЛ</small>
                <div class="temp">24°C</div>
            </div>
            <img src="https://img.icons8.com" width="50">
        </div>

        <div class="grid">
            <div class="card" onclick="openPage('ТУРИЗМ')">
                <img src="https://img.icons8.com">
                <span>ТУРИЗМ</span>
            </div>
            <div class="card" onclick="openPage('ТАКСИ')">
                <img src="https://img.icons8.com">
                <span>ТАКСИ</span>
            </div>
            <div class="card" onclick="openPage('РЕЙСЫ')">
                <img src="https://img.icons8.com">
                <span>РЕЙСЫ</span>
            </div>
            <div class="card" onclick="openPage('СПОРТ')">
                <img src="https://img.icons8.com">
                <span>СПОРТ</span>
            </div>
        </div>
    </div>

    <div id="content-screen">
        <p>Раздел в разработке...</p>
    </div>

    <div class="nav">
        <img src="https://img.icons8.com" width="26">
        <img src="https://img.icons8.com" width="26">
        <img src="https://img.icons8.com" width="26">
        <img src="https://img.icons8.com" width="26">
    </div>

    <script>
        function openPage(name) {
            document.getElementById('main-ui').style.display = 'none';
            document.getElementById('content-screen').style.display = 'block';
            document.getElementById('back-btn').style.display = 'block';
            document.getElementById('title').innerText = name;
            document.getElementById('subtitle').innerText = 'ИНФОРМАЦИЯ';
        }

        function goBack() {
            document.getElementById('main-ui').style.display = 'block';
            document.getElementById('content-screen').style.display = 'none';
            document.getElementById('back-btn').style.display = 'none';
            document.getElementById('title').innerText = 'admin';
            document.getElementById('subtitle').innerText = 'ГОРОД В ТВОЕМ КАРМАНЕ';
        }
    </script>
</body>
</html>
