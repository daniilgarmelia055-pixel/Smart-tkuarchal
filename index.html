<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>City App Admin</title>
    <style>
        body { font-family: 'Inter', sans-serif; background: #f8f9ff; margin: 0; padding-bottom: 90px; }
        
        /* Шапка */
        .header { background: linear-gradient(135deg, #4b39ef 0%, #39d2c0 100%); padding: 30px 20px 50px; border-bottom-radius: 40px; color: white; border-radius: 0 0 40px 40px; }
        .header h1 { margin: 0; font-size: 24px; text-transform: lowercase; }
        .header p { margin: 0; font-size: 10px; opacity: 0.8; letter-spacing: 1px; }

        /* ЛЕНТА СТОРИС (КАК В ИНСТЕ) */
        .stories-container { display: flex; overflow-x: auto; padding: 20px; gap: 15px; scrollbar-width: none; }
        .stories-container::-webkit-scrollbar { display: none; }
        .story { min-width: 70px; text-align: center; cursor: pointer; }
        .story-ring { width: 66px; height: 66px; border-radius: 50%; background: linear-gradient(#fff, #fff) padding-box, linear-gradient(45deg, #f09433 0%, #e6683c 25%, #dc2743 50%, #cc2366 75%, #bc1888 100%) border-box; border: 3px solid transparent; display: flex; align-items: center; justify-content: center; }
        .story img { width: 60px; height: 60px; border-radius: 50%; object-fit: cover; }
        .story span { font-size: 10px; color: #333; margin-top: 5px; display: block; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        /* Погода */
        .weather { background: white; margin: 0 20px 20px; padding: 20px; border-radius: 30px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 10px 20px rgba(0,0,0,0.03); }
        .weather-info div { font-size: 32px; font-weight: 800; }

        /* Кнопки */
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; padding: 0 20px; }
        .card { background: white; border-radius: 35px; padding: 25px 10px; display: flex; flex-direction: column; align-items: center; box-shadow: 0 10px 20px rgba(0,0,0,0.03); }
        .card img { width: 45px; height: 45px; margin-bottom: 12px; }
        .card span { font-weight: 800; font-size: 13px; color: #333; }

        /* Нижнее меню */
        .nav { position: fixed; bottom: 0; width: 100%; background: white; display: flex; justify-content: space-around; padding: 15px 0; border-radius: 25px 25px 0 0; box-shadow: 0 -5px 20px rgba(0,0,0,0.05); }
    </style>
</head>
<body>

    <div class="header">
        <h1>admin</h1>
        <p>ГОРОД В ТВОЕМ КАРМАНЕ</p>
    </div>

    <!-- СЮДА БУДУТ ПОДГРУЖАТЬСЯ СТОРИС -->
    <div class="stories-container" id="stories-list">
        <!-- Пример одной сторис (потом удалится само) -->
        <div class="story">
            <div class="story-ring"><img src="https://via.placeholder.com"></div>
            <span>загрузка...</span>
        </div>
    </div>

    <div class="weather">
        <div class="weather-info">
            <small style="color:#aaa">ПОГОДА ТКУАРЧАЛ</small>
            <div>24°C</div>
        </div>
        <img src="https://img.icons8.com" width="50">
    </div>

    <div class="grid">
        <div class="card" id="tourism"><img src="https://img.icons8.com"><span>ТУРИЗМ</span></div>
        <div class="card" id="taxi"><img src="https://img.icons8.com"><span>ТАКСИ</span></div>
        <div class="card" id="flights"><img src="https://img.icons8.com"><span>РЕЙСЫ</span></div>
        <div class="card" id="sport"><img src="https://img.icons8.com"><span>СПОРТ</span></div>
    </div>

    <div class="nav">
        <img src="https://img.icons8.com" width="26">
        <img src="https://img.icons8.com" width="26">
        <img src="https://img.icons8.com" width="26">
        <img src="https://img.icons8.com" width="26">
    </div>

    <script>
        const SHEET_ID = 'ВСТАВЬ_СЮДА_ID_ТАБЛИЦЫ'; 

        async function initApp() {
            try {
                // Загружаем кнопки (Лист1)
                const resBtn = await fetch(`https://opensheet.elk.sh{SHEET_ID}/Лист1`);
                const buttons = await resBtn.json();
                buttons.forEach(row => {
                    const card = document.getElementById(row.id);
                    if (card) {
                        if(row.title) card.querySelector('span').innerText = row.title;
                        if(row.icon) card.querySelector('img').src = row.icon;
                    }
                });

                // Загружаем СТОРИС (Stories)
                const resStories = await fetch(`https://opensheet.elk.sh{SHEET_ID}/Stories`);
                const stories = await resStories.json();
                const list = document.getElementById('stories-list');
                list.innerHTML = ''; // очистка
                stories.forEach(s => {
                    list.innerHTML += `
                        <div class="story" onclick="window.open('${s.link}')">
                            <div class="story-ring"><img src="${s.image}"></div>
                            <span>${s.title}</span>
                        </div>`;
                });
            } catch (e) { console.log("Обновление..."); }
        }
        initApp();
    </script>
</body>
</html>
